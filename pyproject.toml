[project]
name = "bunny-cdn-sdk"
version = "0.1.0"
description = "Python SDK for the Bunny CDN API"
authors = [
    { name = "Todd Jacobsen", email = "yolabingo@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    { include-group = "lint" },
    { include-group = "test" },
    { include-group = "audit" },
    "poethepoet>=0.44.0",
]
lint = ["ruff", "ty"]
test = ["pytest", "pytest-cov"]
audit = ["pip-audit"]

[tool.poe.tasks]
dev = "uv sync --all-groups"
lint = "ruff format --check && ruff check && ty check src/"
format = "ruff format ."
test = "pytest --cov-fail-under=80"
build = "uv build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "COM812", "ISC001"]

[tool.pytest.ini_options]
addopts = ["--cov=bunny_cdn_sdk"]

[tool.ty.terminal]
error-on-warning = true

[tool.ty.environment]
python-version = "3.12"

[tool.ty.rules]
possibly-unresolved-reference = "error"
unused-ignore-comment = "warn"
