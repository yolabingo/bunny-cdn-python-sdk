[project]
name = "bunny-cdn-sdk"
version = "2.1.0"
description = "Python SDK for the Bunny CDN API"
readme = "README.md"
authors = [
    { name = "Todd Jacobsen", email = "yolabingo@gmail.com" }
]
license = { text = "MIT" }
requires-python = ">=3.12"
keywords = ["bunny", "cdn", "bunnycdn", "api", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.28.1",
]

[project.urls]
Homepage = "https://github.com/yolabingo/bunny-cdn-python-sdk"
Repository = "https://github.com/yolabingo/bunny-cdn-python-sdk"
"Bug Tracker" = "https://github.com/yolabingo/bunny-cdn-python-sdk/issues"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

[project.optional-dependencies]
cli = [
    "typer>=0.12.0,<1",
    "rich>=13.0.0",
]

[project.scripts]
bunnycdn = "bunny_cdn_sdk.cli:app"

[dependency-groups]
dev = [
    { include-group = "lint" },
    { include-group = "test" },
    { include-group = "audit" },
    "poethepoet>=0.44.0",
]
lint = ["ruff", "ty"]
test = ["pytest", "pytest-cov", "pytest-xdist"]
audit = ["pip-audit", "twine"]

[tool.poe.tasks]
dev = "uv sync --all-groups"
lint = "ruff format --check && ruff check && ty check src/"
format = "ruff format ."
test = "pytest -n auto --cov-fail-under=80"
build = "uv build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "COM812", "ISC001", "ANN401"]

[tool.ruff.lint.per-file-ignores]
"src/bunny_cdn_sdk/cli/**" = ["TRY003", "FBT001", "FBT002", "FBT003", "PLR0913", "PLC0415", "A002", "B008", "TC001"]
"src/bunny_cdn_sdk/core.py" = ["A002"]  # id param matches Bunny API surface (API fidelity)
"tests/**" = [
    "ANN",       # type annotations not required in tests
    "ARG",       # unused arguments common in handler stubs
    "S101",      # assert is expected in pytest tests
    "SLF001",    # private member access is normal in unit tests
    "PLR2004",   # magic values are readable in test assertions
    "SIM117",    # nested with statements are fine in tests
    "B017",      # pytest.raises(Exception) acceptable in broad tests
    "PT011",     # broad pytest.raises acceptable in tests
    "RUF100",    # noqa directives may reference rules suppressed above
    "N806",      # MockClient variable naming — standard mock pattern
    "PLC0415",   # imports inside test bodies are common
    "TC",        # typing-only import checks not required in tests
]

[tool.pytest.ini_options]
addopts = ["--cov=bunny_cdn_sdk"]

[tool.ty.terminal]
error-on-warning = true

[tool.ty.environment]
python-version = "3.12"

[tool.ty.rules]
possibly-unresolved-reference = "error"
unused-ignore-comment = "warn"
