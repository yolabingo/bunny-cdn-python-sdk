version: 2
updates:
  # Python dependencies via pip (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    reviewers:
      - "yolabingo"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 5
    reviewers:
      - "yolabingo"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
